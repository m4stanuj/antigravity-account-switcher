name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: |
          npm install
          npx eslint extension.js --no-eslintrc --rule '{"no-undef": "off", "no-unused-vars": "warn"}' || true
          echo "Lint complete"
